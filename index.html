const instincts=[{"icon": "🏔️", "key": "territory", "cat": "status", "title": {"zh": "领地本能", "en": "Territory instinct", "ja": "縄張り本能"}, "brief": {"zh": "“这是我的地方”：占有、标记和边界维护。", "en": "“This is mine”: possession, marking, boundary defense.", "ja": "「ここは自分の場所」：所有、標識、境界維持。"}, "micro": {"zh": "接口：房产、车位、云空间、私域、主页、会员专区。", "en": "Interfaces: real estate, parking, cloud space, private groups, homepages, member zones.", "ja": "接口：不動産、駐車場、クラウド、私域、ホーム、会員区画。"}, "mechanism": {"zh": "领地不是单纯空间，而是可被确认的控制范围。人会为“我的位置”“我的圈子”“我的收藏”支付溢价。", "en": "Territory is not merely space; it is a confirmed sphere of control. People pay a premium for “my place,” “my circle,” and “my collection.”", "ja": "縄張りは単なる空間ではなく、確認可能な支配範囲である。「自分の場所」「自分の圈子」「自分の收藏」に人は上乗せ価格を払う。"}, "application": [{"zh": "稀缺户型、限定名额、私密社群", "en": "Scarce units, limited seats, private communities", "ja": "希少物件、限定枠、非公開コミュニティ"}, {"zh": "可命名空间：我的主页、我的云盘、我的收藏夹", "en": "Nameable spaces: my homepage, my cloud drive, my collection", "ja": "名前を付けられる空間：マイページ、クラウド、收藏"}, {"zh": "地图、徽章、地址、门牌号强化拥有感", "en": "Maps, badges, addresses, and room numbers reinforce ownership", "ja": "地図、バッジ、住所、部屋番号が所有感を強化する"}], "defense": [{"zh": "把“拥有”改写成“维护成本”", "en": "Rewrite ownership as maintenance cost", "ja": "「所有」を「維持コスト」として読み替える"}, {"zh": "任何领地型购买都延迟一晚再决定", "en": "Delay territory purchases overnight", "ja": "縄張り型購入は一晩遅らせる"}, {"zh": "问：我是在买功能，还是在买边界？", "en": "Ask: am I buying function or boundary?", "ja": "問う：機能を買うのか、境界を買うのか？"}], "sample": {"zh": "一套“创始会员社区”页面把头像墙、编号席位和永久入口放在首屏。", "en": "A “founding member community” page puts avatar walls, numbered seats, and lifetime access above the fold.", "ja": "「創設メンバー社区」ページがアバター壁、番号席、永久入口をファーストビューに置く。"}}, {"icon": "👑", "key": "rank", "cat": "status", "title": {"zh": "等级展示", "en": "Rank display", "ja": "順位表示"}, "brief": {"zh": "让别的灵长类知道自己的 rank。", "en": "Let other primates see your rank.", "ja": "他の霊長類に自分の順位を見せる。"}, "micro": {"zh": "接口：奢侈品、头等舱、认证标识、排行榜、段位。", "en": "Interfaces: luxury, first class, verified badges, leaderboards, tiers.", "ja": "接口：高級品、ファーストクラス、認証、ランキング、段位。"}, "mechanism": {"zh": "等级展示把消费从功能判断变成社会信号发送。功能可以比较，地位不能被理性完全压低。", "en": "Rank display turns consumption from functional choice into social signaling. Function can be compared; status resists being priced rationally.", "ja": "順位表示は消費を機能判断から社会信号に変える。機能は比較できるが、地位は理性だけでは抑えにくい。"}, "application": [{"zh": "可见标识越强，溢价越高", "en": "More visible badges create higher premiums", "ja": "見える標識が強いほどプレミアムが上がる"}, {"zh": "排行榜让身份焦虑持续刷新", "en": "Leaderboards refresh status anxiety", "ja": "ランキングが身份不安を更新し続ける"}, {"zh": "限量款把稀缺性转成可展示优越感", "en": "Limited editions convert scarcity into visible superiority", "ja": "限定品が希少性を見える優越に変える"}], "defense": [{"zh": "区分“好用”与“可被看见”", "en": "Separate “useful” from “visible.”", "ja": "「使える」と「見せられる」を分ける"}, {"zh": "隐藏式消费比显性消费更能测试真实需要", "en": "Invisible consumption tests real need better than conspicuous consumption", "ja": "見えない消費の方が本当の需要を測りやすい"}, {"zh": "把展示成本记入总价", "en": "Add signaling cost to the total price", "ja": "表示コストを総額に入れる"}], "sample": {"zh": "一个订阅工具把普通用户标成灰色，把 Pro 用户显示成金色徽章。", "en": "A subscription tool colors free users grey and Pro users with a gold badge.", "ja": "サブスクツールが無料ユーザーを灰色、Pro を金色バッジで表示する。"}}, {"icon": "🤝", "key": "grooming", "cat": "social", "title": {"zh": "梳毛社交", "en": "Grooming sociality", "ja": "グルーミング社交"}, "brief": {"zh": "点赞、评论、转发都是数字梳毛。", "en": "Likes, comments, and reposts are digital grooming.", "ja": "いいね、コメント、拡散はデジタルな毛づくろい。"}, "micro": {"zh": "接口：社交媒体、私信提醒、共同好友、生日祝福。", "en": "Interfaces: social media, DM alerts, mutual friends, birthday prompts.", "ja": "接口：SNS、DM通知、共通友人、誕生日通知。"}, "mechanism": {"zh": "低成本互动维护关系。平台把这种互动做成高频仪式，再把注意力卖给广告或转化链。", "en": "Low-cost interaction maintains bonds. Platforms ritualize it at high frequency and sell the resulting attention.", "ja": "低コスト互动が关系を維持する。平台はそれを高頻度の儀式にし、注意を売る。"}, "application": [{"zh": "“有人提到你”触发回访", "en": "“Someone mentioned you” triggers return", "ja": "「あなたに言及」が再訪を促す"}, {"zh": "评论区制造参与义务", "en": "Comment sections create participation duty", "ja": "コメント欄が参加義務を作る"}, {"zh": "连续互动形成关系沉没成本", "en": "Repeated interaction creates relational sunk cost", "ja": "継続互动が関係のサンクコストを作る"}], "defense": [{"zh": "批量处理社交消息", "en": "Batch social messages", "ja": "社交通知をまとめて処理する"}, {"zh": "关闭非必要互动提醒", "en": "Turn off nonessential interaction alerts", "ja": "不要な互动通知を切る"}, {"zh": "把“回复义务”与“真实关系”分开", "en": "Separate reply duty from real relationship", "ja": "返信義務と実関係を分ける"}], "sample": {"zh": "短视频评论区不断提示“作者回复了你”，把观看拉回对话场。", "en": "A short-video app keeps saying “the creator replied to you,” pulling viewing back into a conversation loop.", "ja": "短動画アプリが「作者が返信しました」と出し、視聴を会話ループに戻す。"}}, {"icon": "🐑", "key": "conformity", "cat": "social", "title": {"zh": "模仿/从众", "en": "Conformity", "ja": "模倣/同調"}, "brief": {"zh": "看见同类在吃什么，就降低自己试错成本。", "en": "Seeing what others choose lowers perceived trial cost.", "ja": "他者の選択を見ると試行コストが下がる。"}, "micro": {"zh": "接口：种草、销量数字、热门榜、排队、评分。", "en": "Interfaces: seeding, sales counts, trending lists, queues, ratings.", "ja": "接口：おすすめ、販売数、人気榜、行列、評価。"}, "mechanism": {"zh": "从众是低成本决策。商业系统会把“别人已经选了”包装成替代判断。", "en": "Conformity is low-cost decision-making. Commerce turns “others chose it” into a substitute for judgment.", "ja": "同調は低コスト意思決定。商業は「他者が選んだ」を判断の代替にする。"}, "application": [{"zh": "“10万人已购买”短路独立评估", "en": "“100k bought this” bypasses individual evaluation", "ja": "「10万人購入」が独立評価を短絡する"}, {"zh": "排队照片制造质量幻觉", "en": "Queue photos imply quality", "ja": "行列写真が品質幻想を作る"}, {"zh": "评分聚合把复杂判断降维成数字", "en": "Aggregated ratings compress complexity into one number", "ja": "評価集約が複雑な判断を数字に圧縮する"}], "defense": [{"zh": "先看差评和退货理由", "en": "Read negative reviews and return reasons first", "ja": "まず低評価と返品理由を見る"}, {"zh": "隐藏销量信息再判断", "en": "Judge after hiding sales signals", "ja": "販売数を隠して判断する"}, {"zh": "问：如果没人买，我还会买吗？", "en": "Ask: would I buy if no one else had?", "ja": "問う：誰も買っていなくても買うか？"}], "sample": {"zh": "商品卡片先显示“本地 327 人正在看”，再显示参数。", "en": "A product card shows “327 people nearby are viewing” before specifications.", "ja": "商品カードが仕様より先に「近くの327人が閲覧中」と表示する。"}}, {"icon": "🧺", "key": "hoarding", "cat": "risk", "title": {"zh": "囤积本能", "en": "Hoarding instinct", "ja": "備蓄本能"}, "brief": {"zh": "买了不用，也会因为“不能没有”而舒服。", "en": "Even unused things comfort people by reducing “what if.”", "ja": "使わなくても「ないと困る」を減らして安心する。"}, "micro": {"zh": "接口：大包装、会员仓储、知识付费、素材库、游戏库。", "en": "Interfaces: bulk packs, warehouse clubs, courses, asset libraries, game libraries.", "ja": "接口：大容量、会員倉庫、知識課金、素材庫、ゲーム庫。"}, "mechanism": {"zh": "不确定环境鼓励储备。现代商业放大不确定感，再把“储备”卖给人。", "en": "Uncertainty rewards reserves. Modern commerce amplifies uncertainty and sells storage as relief.", "ja": "不確実性は備蓄を促す。現代商業は不確実性を拡大し、備蓄を安心として売る。"}, "application": [{"zh": "满减促进多买", "en": "Threshold discounts induce overbuying", "ja": "割引条件が過剰購入を促す"}, {"zh": "素材包、课程包承诺未来可用", "en": "Asset and course bundles promise future use", "ja": "素材パックや講座パックが未来の使用を約束する"}, {"zh": "“以后会用到”替代当下需求", "en": "“I might need it later” replaces current need", "ja": "「いつか使う」が現在需要を置き換える"}], "defense": [{"zh": "库存可视化：列出已拥有物", "en": "Visualize inventory", "ja": "持ち物を可視化する"}, {"zh": "把未来使用概率写成百分比", "en": "Write future-use probability as a percentage", "ja": "未来使用確率を％で書く"}, {"zh": "买前规定使用场景和期限", "en": "Define use case and deadline before buying", "ja": "購入前に使用場面と期限を決める"}], "sample": {"zh": "网盘会员页强调“10TB 永久安全感”，不谈今天真正要存什么。", "en": "A cloud storage plan sells “10TB of permanent peace of mind” rather than today’s actual files.", "ja": "クラウド会員ページが「10TBの永続安心」を売り、今日保存する物は語らない。"}}, {"icon": "✨", "key": "novelty", "cat": "reward", "title": {"zh": "新奇寻求", "en": "Novelty seeking", "ja": "新奇性追求"}, "brief": {"zh": "奖励不如“可能有奖励”更让人继续。", "en": "The possibility of reward often drives more than reward itself.", "ja": "報酬そのものより「報酬があるかも」が継続させる。"}, "micro": {"zh": "接口：短视频、盲盒、抽卡、开箱、刷新。", "en": "Interfaces: short video, blind boxes, gacha, unboxing, refresh.", "ja": "接口：短動画、ブラインドボックス、ガチャ、開封、更新。"}, "mechanism": {"zh": "多巴胺对预期误差敏感。未知内容不断刷新，会让系统持续等待下一次刺激。", "en": "Dopamine responds to prediction error. Unknown content keeps the system waiting for the next hit.", "ja": "ドーパミンは予測誤差に敏感。未知内容の更新が次の刺激を待たせる。"}, "application": [{"zh": "无限流让停止点消失", "en": "Infinite feeds remove stopping points", "ja": "無限フィードが停止点を消す"}, {"zh": "抽卡把购买变成开奖", "en": "Gacha turns payment into a draw", "ja": "ガチャが支払いを抽選に変える"}, {"zh": "开箱视频把新奇感外包给观看者", "en": "Unboxing exports novelty to viewers", "ja": "開封動画が新奇感を視聴者に移す"}], "defense": [{"zh": "固定刷新次数", "en": "Set a fixed refresh count", "ja": "更新回数を固定する"}, {"zh": "禁用自动播放", "en": "Disable autoplay", "ja": "自動再生を切る"}, {"zh": "把“再看一条”改成倒计数", "en": "Turn “one more” into a visible countdown", "ja": "「もう一本」を可視カウントにする"}], "sample": {"zh": "盲盒详情页只展示剪影和概率，让“下一次可能出隐藏款”成为主商品。", "en": "A blind-box page shows silhouettes and probabilities so “the next draw might be rare” becomes the real product.", "ja": "ブラインドボックス頁がシルエットと確率だけを見せ、「次はレアかも」を商品にする。"}}, {"icon": "😰", "key": "loss", "cat": "risk", "title": {"zh": "损失厌恶", "en": "Loss aversion", "ja": "損失回避"}, "brief": {"zh": "失去的痛常常大于获得的爽。", "en": "Loss often hurts more than gain pleases.", "ja": "失う痛みは得る快感より強くなりやすい。"}, "micro": {"zh": "接口：保险、限时折扣、即将涨价、仅剩几件。", "en": "Interfaces: insurance, limited discounts, price hikes, low stock.", "ja": "接口：保険、限定割引、値上げ予告、残り数点。"}, "mechanism": {"zh": "人更害怕失去已拥有或即将拥有的东西。商家会先制造“准拥有感”，再让你害怕失去。", "en": "People fear losing what they own or almost own. Commerce creates quasi-ownership and then threatens removal.", "ja": "人は所有またはほぼ所有した物を失うのを恐れる。商業は準所有感を作り、それを失わせる。"}, "application": [{"zh": "购物车保留制造准拥有", "en": "Saved carts create quasi-ownership", "ja": "カート保存が準所有を作る"}, {"zh": "试用期结束制造剥夺感", "en": "Trial endings feel like deprivation", "ja": "試用終了が剥奪感を作る"}, {"zh": "倒计时让折扣像正在消失的资产", "en": "Countdowns make discounts feel like vanishing assets", "ja": "カウントダウンが割引を消える資産にする"}], "defense": [{"zh": "把“省了多少钱”改成“花了多少钱”", "en": "Translate savings into spending", "ja": "「節約額」を「支出額」に訳す"}, {"zh": "单独判断需求，不看折扣", "en": "Judge need without the discount", "ja": "割引を外して需要を判断する"}, {"zh": "不在倒计时内买非必需品", "en": "Never buy nonessentials under countdown", "ja": "カウントダウン下で非必需品を買わない"}], "sample": {"zh": "机票页面显示“该价格 8 分钟后失效”，用户感觉不是买票，而是在防止价格逃走。", "en": "A flight page says “this price expires in 8 minutes,” making the user prevent a price from escaping.", "ja": "航空券頁が「8分で価格失効」と出し、購入ではなく価格の逃亡阻止に見せる。"}}, {"icon": "🔄", "key": "reciprocity", "cat": "social", "title": {"zh": "互惠义务", "en": "Reciprocity debt", "ja": "互酬義務"}, "brief": {"zh": "收了礼物会不舒服，直到还回去。", "en": "A gift creates discomfort until repayment.", "ja": "贈り物は返すまで不快な負債になる。"}, "micro": {"zh": "接口：免费试用、样品、小礼品、免费内容、打赏。", "en": "Interfaces: free trials, samples, gifts, free content, tipping.", "ja": "接口：無料試用、サンプル、小さな贈り物、無料内容、投げ銭。"}, "mechanism": {"zh": "互惠是合作网络协议。免费不是没有价格，常常把价格转成心理债务。", "en": "Reciprocity sustains cooperation. Free is not always free; it can convert price into psychological debt.", "ja": "互酬は協力网络の协议。無料は価格ゼロではなく、心理的債務へ移すことがある。"}, "application": [{"zh": "先送资料再推课", "en": "Give a free guide, then sell a course", "ja": "先に資料を配り講座を売る"}, {"zh": "免费咨询后要求成交", "en": "Free consultation creates pressure to close", "ja": "無料相談後に成約压力を作る"}, {"zh": "内容长期陪伴后请求支持", "en": "Long-term content companionship asks for support", "ja": "长期陪伴コンテンツが支援を求める"}], "defense": [{"zh": "把免费视为营销预算", "en": "Treat free as marketing budget", "ja": "無料をマーケ予算として見る"}, {"zh": "拒绝即时回报冲动", "en": "Refuse immediate repayment impulse", "ja": "即時返礼衝動を拒む"}, {"zh": "区分感谢与购买", "en": "Separate gratitude from purchase", "ja": "感謝と購入を分ける"}], "sample": {"zh": "创作者先发“免费模板”，再说“觉得有用就买完整版支持一下”。", "en": "A creator gives a free template, then says “buy the full pack if this helped.”", "ja": "作者が無料テンプレを配り、「役立ったら完全版で支援して」と言う。"}}, {"icon": "🗣️", "key": "gossip", "cat": "social", "title": {"zh": "八卦需求", "en": "Gossip drive", "ja": "噂話欲求"}, "brief": {"zh": "追踪第三方社会信息，是联盟计算的一部分。", "en": "Tracking third-party social information is alliance computation.", "ja": "第三者の社会情報追跡は同盟計算である。"}, "micro": {"zh": "接口：热搜、爆料、评论区、弹幕、娱乐新闻。", "en": "Interfaces: trending topics, leaks, comments, bullet chat, celebrity news.", "ja": "接口：トレンド、暴露、コメント欄、弾幕、芸能ニュース。"}, "mechanism": {"zh": "人需要知道谁结盟、谁失势、谁被排除。平台把这种社会监测变成无限内容燃料。", "en": "People track alliances, decline, and exclusion. Platforms turn social monitoring into endless fuel.", "ja": "人は同盟、失墜、排除を追う。平台はそれを無限コンテンツ燃料にする。"}, "application": [{"zh": "标题制造“你还不知道”的信息缺口", "en": "Headlines create “you do not know yet” gaps", "ja": "見出しが「まだ知らない」ギャップを作る"}, {"zh": "评论区延长情绪参与", "en": "Comment threads extend emotional participation", "ja": "コメント欄が感情参加を延長する"}, {"zh": "爆料分段发布制造连续追踪", "en": "Staged leaks create serial tracking", "ja": "分割暴露が連続追跡を作る"}], "defense": [{"zh": "限定八卦窗口", "en": "Limit gossip windows", "ja": "噂話時間を限定する"}, {"zh": "不在情绪最高点转发", "en": "Do not repost at emotional peak", "ja": "感情ピークで拡散しない"}, {"zh": "问：这条信息会改变我什么行动？", "en": "Ask: what action will this information change?", "ja": "問う：この情報は自分の行動を何か変えるか？"}], "sample": {"zh": "热搜标题写成“全网都在等一个回应”，让围观变成集体义务。", "en": "A trending headline says “the whole internet is waiting for a response,” turning watching into a collective duty.", "ja": "トレンド見出しが「全ネットが返答待ち」と書き、野次馬を集団義務にする。"}}, {"icon": "🪞", "key": "identity", "cat": "status", "title": {"zh": "身份一致性", "en": "Identity consistency", "ja": "アイデンティティ一貫性"}, "brief": {"zh": "人会为“像自己”持续付款。", "en": "People pay to remain the kind of person they think they are.", "ja": "人は「自分らしさ」を維持するために払う。"}, "micro": {"zh": "接口：苹果用户、跑者、知识分子、环保生活方式。", "en": "Interfaces: Apple user, runner, intellectual, green lifestyle.", "ja": "接口：Appleユーザー、ランナー、知識人、エコ生活。"}, "mechanism": {"zh": "身份一旦绑定商品，购买就不再是性价比，而是自我连续性的维护。", "en": "Once identity binds to a product, purchase becomes self-continuity rather than value-for-money.", "ja": "身份が商品に結びつくと、購入はコスパではなく自己連続性の維持になる。"}, "application": [{"zh": "品牌社区制造“我们”", "en": "Brand communities manufacture “we.”", "ja": "ブランド社区が「私たち」を作る"}, {"zh": "商品语言从功能转向人格", "en": "Product language shifts from function to personality", "ja": "商品語彙が機能から人格へ移る"}, {"zh": "老用户权益强化身份沉没", "en": "Loyalty benefits deepen identity sunk cost", "ja": "既存ユーザー权益が身份のサンクコストを強化する"}], "defense": [{"zh": "把身份从品牌中剥离", "en": "Detach identity from brand", "ja": "身份をブランドから剥がす"}, {"zh": "用动词替代名词：我跑步，不是我属于某部落", "en": "Use verbs, not tribes: I run; I do not belong to a runner tribe", "ja": "名詞より動詞：走るのであって部族に属するのではない"}, {"zh": "每年审计一次身份消费", "en": "Audit identity spending yearly", "ja": "身份消費を年一回監査する"}], "sample": {"zh": "跑步 App 把鞋、手表、训练营和勋章连成“真正跑者”的身份套装。", "en": "A running app links shoes, watches, camps, and badges into a “real runner” identity kit.", "ja": "ランニングアプリが靴、時計、キャンプ、徽章を「本物のランナー」セットにする。"}}, {"icon": "🧬", "key": "mating", "cat": "status", "title": {"zh": "配偶信号", "en": "Mating signal", "ja": "配偶シグナル"}, "brief": {"zh": "大量消费不是为了使用，而是为了被选择。", "en": "Much consumption is not use-value; it is selectability.", "ja": "多くの消費は使用ではなく、選ばれやすさである。"}, "micro": {"zh": "接口：香水、健身、美妆、汽车、摄影、社交软件。", "en": "Interfaces: perfume, fitness, beauty, cars, photography, dating apps.", "ja": "接口：香水、フィットネス、美容、車、写真、マッチング。"}, "mechanism": {"zh": "吸引力经济会把资源、审美、纪律、稀缺性编码为可展示信号。", "en": "The attraction economy encodes resources, taste, discipline, and scarcity as displayable signals.", "ja": "魅力経済は資源、審美、規律、希少性を表示可能な信号にする。"}, "application": [{"zh": "“提升魅力”替代“解决问题”", "en": "“Improve attractiveness” replaces solving a problem", "ja": "「魅力アップ」が問題解決を置き換える"}, {"zh": "约会场景放大装备需求", "en": "Dating scenarios inflate equipment need", "ja": "デート場面が装備需要を膨らませる"}, {"zh": "身体管理产品绑定被看见的未来", "en": "Body products bind to a future gaze", "ja": "身体管理商品が見られる未来に結びつく"}], "defense": [{"zh": "识别信号消费和实际改善的差别", "en": "Separate signaling from actual improvement", "ja": "信号消費と実改善を分ける"}, {"zh": "不在羞耻感中购买外貌产品", "en": "Do not buy appearance products under shame", "ja": "羞恥中に外見商品を買わない"}, {"zh": "问：这是提升能力还是购买被选择幻想？", "en": "Ask: improvement, or a fantasy of being chosen?", "ja": "問う：能力向上か、選ばれる幻想か？"}], "sample": {"zh": "约会软件广告说“换一张头像，换一种人生”，把摄影套餐变成被选择的门票。", "en": "A dating-app ad says “change your profile photo, change your life,” turning a photo package into a ticket to being chosen.", "ja": "マッチング広告が「写真を変えれば人生が変わる」と言い、撮影套餐を選ばれる券にする。"}}, {"icon": "🛡️", "key": "coalition", "cat": "social", "title": {"zh": "联盟/敌我识别", "en": "Coalition detection", "ja": "同盟/敵味方識別"}, "brief": {"zh": "找到同盟和敌人，会让世界变简单。", "en": "Allies and enemies simplify the world.", "ja": "味方と敵が見えると世界は単純になる。"}, "micro": {"zh": "接口：粉圈、政治传播、品牌阵营、社群黑话。", "en": "Interfaces: fandoms, political messaging, brand camps, insider jargon.", "ja": "接口：ファン圈、政治传播、品牌陣営、社群隠語。"}, "mechanism": {"zh": "群体边界降低判断成本。只要商品变成阵营符号，购买就是站队。", "en": "Group boundaries lower cognitive cost. Once a product becomes a camp symbol, buying is taking sides.", "ja": "集団境界は判断コストを下げる。商品が陣営記号になると購入は立場表明になる。"}, "application": [{"zh": "黑话提升内部感", "en": "Jargon increases insider feeling", "ja": "隠語が内部感を強める"}, {"zh": "共同敌人增强凝聚", "en": "Common enemies increase cohesion", "ja": "共通敵が凝集を強める"}, {"zh": "品牌对立制造忠诚度", "en": "Brand rivalry manufactures loyalty", "ja": "ブランド対立が忠誠を作る"}], "defense": [{"zh": "拒绝用消费表达阵营", "en": "Refuse to express camp through consumption", "ja": "消費で陣営を表さない"}, {"zh": "看见“他们都……”就暂停", "en": "Pause when you see “they all…”", "ja": "「彼らは皆…」を見たら停止"}, {"zh": "把事实判断和身份立场分开", "en": "Separate fact judgment from identity stance", "ja": "事实判断と身份立場を分ける"}], "sample": {"zh": "耳机品牌把用户称作“真正懂声音的人”，同时嘲笑另一品牌是“智商税”。", "en": "A headphone brand calls its users “people who truly understand sound” and mocks rivals as stupid-tax.", "ja": "イヤホン品牌がユーザーを「本当に音が分かる人」と呼び、他品牌を嘲笑する。"}}, {"icon": "🤢", "key": "disgust", "cat": "risk", "title": {"zh": "厌恶/洁净", "en": "Disgust / purity", "ja": "嫌悪/清潔"}, "brief": {"zh": "“脏”“低级”“不配”能快速触发排斥。", "en": "“Dirty,” “cheap,” and “not good enough” trigger fast rejection.", "ja": "「汚い」「低級」「ふさわしくない」は素早く排斥を起動する。"}, "micro": {"zh": "接口：清洁用品、精致生活、阶层审美、健康焦虑。", "en": "Interfaces: cleaning products, refined lifestyle, class taste, health anxiety.", "ja": "接口：清潔用品、精致生活、階層審美、健康不安。"}, "mechanism": {"zh": "厌恶反应原本服务于病原体防御，现代商业会把它转译成阶层、身体和生活方式焦虑。", "en": "Disgust began as pathogen defense. Commerce translates it into class, body, and lifestyle anxiety.", "ja": "嫌悪反応は病原体防御から来た。現代商業はそれを階層、身体、生活様式の不安に翻訳する。"}, "application": [{"zh": "“高级感”常常是反脏话术", "en": "“Premium feel” often works as anti-dirt rhetoric", "ja": "「高級感」は反汚れ言説として働く"}, {"zh": "卫生焦虑驱动重复购买", "en": "Hygiene anxiety drives repeat purchase", "ja": "衛生不安が反復購入を促す"}, {"zh": "低级感制造升级需求", "en": "Fear of cheapness creates upgrade demand", "ja": "低級感がアップグレード需要を作る"}], "defense": [{"zh": "区分卫生风险和审美羞耻", "en": "Separate hygiene risk from aesthetic shame", "ja": "衛生リスクと審美羞恥を分ける"}, {"zh": "避免被“精致”定义生活合格线", "en": "Do not let “refined” define life qualification", "ja": "「精致」に生活合格線を決めさせない"}, {"zh": "观察是否因厌恶而非需要付款", "en": "Check whether disgust, not need, is paying", "ja": "必要ではなく嫌悪で払っていないか見る"}], "sample": {"zh": "家居广告把普通浴室拍成“细菌可见的战场”，再销售高级消毒套装。", "en": "A home ad frames an ordinary bathroom as a visible battlefield of germs, then sells a premium sterilizing kit.", "ja": "住居広告が普通の浴室を「菌の戦場」にし、高級消毒セットを売る。"}}, {"icon": "🎲", "key": "riskplay", "cat": "reward", "title": {"zh": "游戏/冒险", "en": "Play / risk", "ja": "遊び/リスク"}, "brief": {"zh": "风险本身也能成为奖赏。", "en": "Risk itself can become reward.", "ja": "リスク自体が報酬になる。"}, "micro": {"zh": "接口：投资 App、游戏、彩票、交易、竞猜。", "en": "Interfaces: trading apps, games, lotteries, speculation, betting-like mechanics.", "ja": "接口：投資アプリ、ゲーム、彩票、取引、予想。"}, "mechanism": {"zh": "不确定性和控制幻觉制造兴奋。人会把“我判断对了”的快感误认成收益逻辑。", "en": "Uncertainty and control illusion create excitement. People confuse “I was right” pleasure with profit logic.", "ja": "不確実性と制御幻想が興奮を作る。「当てた快感」を収益ロジックと誤認する。"}, "application": [{"zh": "K线与游戏反馈相似", "en": "Candlestick charts resemble game feedback", "ja": "K線はゲーム反馈に似る"}, {"zh": "小额下注降低损失痛", "en": "Small stakes lower loss pain", "ja": "少額賭けが損失痛を下げる"}, {"zh": "排行榜把风险行为社会化", "en": "Leaderboards socialize risky behavior", "ja": "ランキングがリスク行動を社会化する"}], "defense": [{"zh": "把刺激账户和投资账户分开", "en": "Separate thrill account from investment account", "ja": "刺激口座と投資口座を分ける"}, {"zh": "记录真实收益率，不记录爽感", "en": "Track real returns, not excitement", "ja": "快感ではなく実収益率を記録する"}, {"zh": "高频决策设置冷却期", "en": "Add cooldown to high-frequency decisions", "ja": "高頻度判断に冷却時間を置く"}], "sample": {"zh": "交易 App 在每次盈利后放烟花动画，把金融动作做成游戏击杀反馈。", "en": "A trading app fires confetti after each gain, turning finance into a game-kill feedback loop.", "ja": "取引アプリが利益のたびに紙吹雪を出し、金融行動をゲーム撃破反馈にする。"}}, {"icon": "🏆", "key": "competence", "cat": "reward", "title": {"zh": "掌控/胜任", "en": "Mastery / competence", "ja": "制御/有能感"}, "brief": {"zh": "人愿意为“我变强了”的感觉付费。", "en": "People pay for the feeling of getting stronger.", "ja": "人は「強くなった感覚」に払う。"}, "micro": {"zh": "接口：课程、工具、健身、效率软件、技能证书。", "en": "Interfaces: courses, tools, fitness, productivity software, certificates.", "ja": "接口：講座、ツール、フィットネス、效率软件、資格。"}, "mechanism": {"zh": "胜任感是高阶奖赏。问题在于，购买工具会被误当成能力已经提升。", "en": "Competence is a high-order reward. The trap is mistaking tool purchase for actual skill gain.", "ja": "有能感は高次報酬。問題はツール購入を能力向上と誤認すること。"}, "application": [{"zh": "“从入门到精通”提供成长幻觉", "en": "“From beginner to master” offers growth illusion", "ja": "「入門から達人へ」が成長幻想を提供する"}, {"zh": "证书替代真实作品", "en": "Certificates replace real work", "ja": "証書が実作品を置き換える"}, {"zh": "工具升级替代训练", "en": "Tool upgrades replace practice", "ja": "ツール更新が訓練を置き換える"}], "defense": [{"zh": "先定义可验证产出", "en": "Define verifiable output first", "ja": "検証可能な成果を先に定義する"}, {"zh": "学习类消费必须绑定交付物", "en": "Bind learning spend to deliverables", "ja": "学習消費を成果物に紐づける"}, {"zh": "买工具前先用旧工具完成一次成果", "en": "Finish one result with old tools before buying new ones", "ja": "新ツール前に旧ツールで一成果を出す"}], "sample": {"zh": "AI 绘图课程用“7 天成为视觉高手”包装，真正卖的是立刻变强的感觉。", "en": "An AI art course says “become visually fluent in 7 days,” selling immediate competence more than skill.", "ja": "AI画像講座が「7日で视觉高手」と言い、能力より即時有能感を売る。"}}, {"icon": "👶", "key": "care", "cat": "social", "title": {"zh": "照护/弱者反应", "en": "Care response", "ja": "養護反応"}, "brief": {"zh": "可爱、脆弱、需要帮助会降低拒绝。", "en": "Cuteness and vulnerability weaken refusal.", "ja": "可愛さ、脆弱さ、助けを必要とする姿は拒否を弱める。"}, "micro": {"zh": "接口：宠物经济、公益消费、IP 周边、萌系设计。", "en": "Interfaces: pets, cause marketing, IP merch, cute design.", "ja": "接口：ペット経済、公益消費、IPグッズ、萌えデザイン。"}, "mechanism": {"zh": "照护回路让人对幼态比例和求助叙事产生保护冲动。商业会把付款包装成照护动作。", "en": "Care circuits respond to infantile proportions and help narratives. Commerce frames payment as care.", "ja": "養護回路は幼態比率と救援物語に反応する。商業は支払いをケア行為に包む。"}, "application": [{"zh": "萌宠带货", "en": "Pet-led commerce", "ja": "萌えペット販売"}, {"zh": "公益联名", "en": "Cause-branded collaborations", "ja": "公益コラボ"}, {"zh": "拟人化客服和虚拟角色", "en": "Anthropomorphic service and virtual characters", "ja": "擬人化客服と仮想角色"}], "defense": [{"zh": "区分同情和解决方案", "en": "Separate sympathy from solution", "ja": "同情と解決策を分ける"}, {"zh": "公益消费先查资金流向", "en": "Check fund flow before cause purchase", "ja": "公益消費は資金流向を確認する"}, {"zh": "可爱不等于需要", "en": "Cute is not need", "ja": "可愛いは必要ではない"}], "sample": {"zh": "一个虚拟宠物 App 说“它今天很想你”，再弹出食物礼包。", "en": "A virtual pet app says “it missed you today,” then offers a food bundle.", "ja": "仮想ペットアプリが「今日あなたに会いたかった」と言い、餌礼包を出す。"}}];
const techs=[{"icon": "⏱️", "key": "timecompression", "cat": "time", "title": {"zh": "时间压缩", "en": "Time compression", "ja": "時間圧縮"}, "brief": {"zh": "跑赢“等一下”。", "en": "Outrun the “wait a second.”", "ja": "「ちょっと待て」を追い越す。"}, "micro": {"zh": "实现：限时抢购、秒杀、直播倒计时。", "en": "Methods: flash sales, countdowns, live-commerce drops.", "ja": "実装：タイムセール、秒殺、ライブカウントダウン。"}, "mechanism": {"zh": "前额叶需要启动时间。压缩时间就是让行动在评估完成前发生。", "en": "The prefrontal cortex needs time to start. Compressing time makes action occur before evaluation finishes.", "ja": "前頭前野には起動時間が要る。時間圧縮は評価完了前に行動を起こす。"}, "application": [{"zh": "秒杀按钮提前亮起", "en": "Flash-sale button lights up early", "ja": "秒殺ボタンが先に点灯する"}, {"zh": "库存数字不断减少", "en": "Stock count keeps falling", "ja": "在庫数が減り続ける"}, {"zh": "“3、2、1，上链接”", "en": "“3, 2, 1, link is live.”", "ja": "「3、2、1、リンク公開」"}], "defense": [{"zh": "倒计时内不买非必需品", "en": "No nonessential buying under countdown", "ja": "カウントダウン中に非必需品を買わない"}, {"zh": "把决策推迟到倒计时结束后", "en": "Decide after the countdown ends", "ja": "決定をカウントダウン後に送る"}, {"zh": "用愿望清单替代即时支付", "en": "Wishlist instead of instant payment", "ja": "即時決済を欲しい物リストに置換"}], "sample": {"zh": "直播间喊“最后 30 秒补贴”，按钮变红并自动跳到商品卡。", "en": "A livestream says “last 30 seconds of subsidy,” the button turns red and jumps to the item card.", "ja": "ライブが「補助金ラスト30秒」と叫び、ボタンが赤くなり商品カードへ飛ぶ。"}}, {"icon": "🔁", "key": "prepay", "cat": "choice", "title": {"zh": "决策预支付", "en": "Decision prepayment", "ja": "意思決定の前払い"}, "brief": {"zh": "一次同意，永久执行。", "en": "Agree once, execute forever.", "ja": "一度同意し、永続実行。"}, "micro": {"zh": "实现：自动续费、默认授权、订阅制、自动扣款。", "en": "Methods: autorenewal, default consent, subscriptions, autopay.", "ja": "実装：自動更新、初期承認、サブスク、自動引落。"}, "mechanism": {"zh": "把决策点移到过去，之后就没有“选择时刻”触发评估。", "en": "Move the decision point into the past; later there is no moment of choice to trigger evaluation.", "ja": "意思決定点を過去に移すと、その後は評価を起動する選択時刻が消える。"}, "application": [{"zh": "首月 1 元，次月自动续费", "en": "First month cheap, next month autorenews", "ja": "初月安価、翌月自動更新"}, {"zh": "同意条款中捆绑授权", "en": "Bundled permissions in terms", "ja": "規約内で権限を束ねる"}, {"zh": "取消路径藏在深层菜单", "en": "Cancellation buried in menus", "ja": "解約経路を深いメニューへ隠す"}], "defense": [{"zh": "订阅全部进日历提醒", "en": "Calendar every renewal", "ja": "更新日を全部カレンダー化"}, {"zh": "不用免密支付", "en": "Avoid passwordless payment", "ja": "パスワードなし決済を使わない"}, {"zh": "购买后立刻找到取消入口", "en": "Find the cancellation path immediately after subscribing", "ja": "購入直後に解約入口を確認する"}], "sample": {"zh": "音乐 App 用“免费听 30 天”诱导授权，真正的购买发生在下个月凌晨。", "en": "A music app sells “30 days free”; the real purchase happens at 2 a.m. next month.", "ja": "音楽アプリが「30日無料」を売り、本当の購入は翌月深夜に起きる。"}}, {"icon": "🌊", "key": "overload", "cat": "choice", "title": {"zh": "认知过载", "en": "Cognitive overload", "ja": "認知過負荷"}, "brief": {"zh": "淹没工作记忆，让本能接管。", "en": "Flood working memory so instinct takes over.", "ja": "作業記憶を溢れさせ、本能に渡す。"}, "micro": {"zh": "实现：复杂优惠、满屏弹幕、选项爆炸。", "en": "Methods: complex discounts, chat floods, option overload.", "ja": "実装：複雑割引、弾幕、選択肢爆発。"}, "mechanism": {"zh": "工作记忆容量有限。信息太多时，系统会转向简化规则：跟风、默认、最低价、最显眼。", "en": "Working memory is limited. Too much information pushes people toward shortcuts: social proof, default, lowest price, most salient.", "ja": "作業記憶は有限。情報過多は同調、初期値、最安、最目立つ物へ押し流す。"}, "application": [{"zh": "满减、红包、券叠在同一屏", "en": "Coupons, thresholds, and rebates pile up on one screen", "ja": "割引、红包、クーポンが同一画面に積まれる"}, {"zh": "直播间价格、弹幕、音效同时闪", "en": "Price, chat, and sound flash together", "ja": "価格、弾幕、音が同時に光る"}, {"zh": "套餐多到无法逐项比较", "en": "Too many bundles to compare", "ja": "套餐が多すぎて比較できない"}], "defense": [{"zh": "只保留三个比较维度", "en": "Keep only three comparison dimensions", "ja": "比較軸を三つだけにする"}, {"zh": "退出页面单独计算", "en": "Leave the page and calculate separately", "ja": "ページを離れて別計算する"}, {"zh": "拒绝凑单式复杂优惠", "en": "Reject threshold shopping games", "ja": "条件達成型割引を拒む"}], "sample": {"zh": "外卖平台同时显示红包、津贴、配送券和满减，用户开始凑单而不是判断饿不饿。", "en": "A food app shows coupons, subsidies, delivery vouchers, and thresholds until the user optimizes instead of asking whether they are hungry.", "ja": "出前アプリが红包、補助、配送券、条件割引を出し、空腹判断より凑单へ誘導する。"}}, {"icon": "🌙", "key": "lowpoint", "cat": "time", "title": {"zh": "意志力低谷打击", "en": "Low-point targeting", "ja": "意志力低下狙撃"}, "brief": {"zh": "在疲惫、饥饿、压力高时出手。", "en": "Strike when tired, hungry, or stressed.", "ja": "疲労、空腹、ストレス時を狙う。"}, "micro": {"zh": "实现：深夜外卖、周五促销、压力场景推送。", "en": "Methods: late-night food pushes, Friday promos, stress-triggered offers.", "ja": "実装：深夜出前、金曜販促、ストレス場面通知。"}, "mechanism": {"zh": "疲劳降低抑制能力。此时“犒劳自己”比“重新评估”更容易。", "en": "Fatigue weakens inhibition. “Treat yourself” becomes easier than “evaluate again.”", "ja": "疲労は抑制を弱める。「自分へのご褒美」は再評価より簡単になる。"}, "application": [{"zh": "深夜推甜食和外卖", "en": "Push desserts and delivery late at night", "ja": "深夜に甘味と出前を推す"}, {"zh": "加班后推娱乐会员", "en": "Promote entertainment after overtime", "ja": "残業後に娯楽会員を推す"}, {"zh": "压力内容后接消费入口", "en": "Attach a purchase CTA after stress content", "ja": "ストレス内容の後に購入入口を置く"}], "defense": [{"zh": "晚上十点后不下单", "en": "No orders after 10 p.m.", "ja": "22時以降注文しない"}, {"zh": "情绪峰值只收藏不付款", "en": "Save, do not pay, at emotional peak", "ja": "感情ピークでは保存だけ"}, {"zh": "把“犒劳”提前预算化", "en": "Budget treats in advance", "ja": "ご褒美を事前予算化"}], "sample": {"zh": "加班打车后，App 弹出“今晚值得更好一点”的高价餐券。", "en": "After an overtime ride, an app offers a premium meal coupon: “you deserve better tonight.”", "ja": "残業帰りの配車後、アプリが「今夜は少し良くしていい」と高額食券を出す。"}}, {"icon": "👥", "key": "socialproof", "cat": "social", "title": {"zh": "社会证据短路", "en": "Social-proof shortcut", "ja": "社会的証拠ショートカット"}, "brief": {"zh": "群体已经替我判断了。", "en": "The crowd has judged for me.", "ja": "群衆が判断済み。"}, "micro": {"zh": "实现：销量、评分、好友也在用、在线人数。", "en": "Methods: sales, ratings, friends using it, live viewer count.", "ja": "実装：販売数、評価、友人利用、同時視聴数。"}, "mechanism": {"zh": "社会证据把独立评估替换成“这么多人不可能都错”。", "en": "Social proof replaces evaluation with “that many people cannot all be wrong.”", "ja": "社会的証拠は評価を「こんなに多くが間違うはずない」に置換する。"}, "application": [{"zh": "商品卡置顶“爆款”", "en": "Product card marked “hot.”", "ja": "商品カードに「爆売れ」"}, {"zh": "好友头像出现在购买按钮旁", "en": "Friends’ avatars near purchase button", "ja": "購入ボタン横に友人アイコン"}, {"zh": "直播间滚动成交提醒", "en": "Rolling purchase notifications in livestream", "ja": "ライブに購入通知が流れる"}], "defense": [{"zh": "默认先看低分评论", "en": "Read low-score reviews first", "ja": "低評価から読む"}, {"zh": "屏蔽销量再判断", "en": "Hide sales count", "ja": "販売数を隠す"}, {"zh": "把“别人买”转成“我是否用”", "en": "Translate “others bought” into “will I use it?”", "ja": "「他人が買った」を「自分が使うか」に変える"}], "sample": {"zh": "课程页显示“你关注的 12 人已报名”，让报名像进入同伴队列。", "en": "A course page says “12 people you follow have enrolled,” making purchase feel like joining a peer queue.", "ja": "講座ページが「フォロー中の12人が参加」と出し、購入を同伴列にする。"}}, {"icon": "🧈", "key": "frictionless", "cat": "choice", "title": {"zh": "摩擦消除", "en": "Friction removal", "ja": "摩擦除去"}, "brief": {"zh": "任何停顿都是前额叶入口。", "en": "Every pause is an entry point for judgment.", "ja": "停止はすべて判断の入口。"}, "micro": {"zh": "实现：一键下单、免密支付、地址自动填充。", "en": "Methods: one-click buy, passwordless payment, autofill address.", "ja": "実装：ワンクリック、パスなし決済、住所自動入力。"}, "mechanism": {"zh": "摩擦制造停顿，停顿给前额叶开机时间。消除摩擦就是焊死“等一下”。", "en": "Friction creates pauses; pauses start the prefrontal cortex. Removing friction welds shut the “wait.”", "ja": "摩擦は停止を作り、停止は前頭前野を起動する。摩擦除去は「待て」を塞ぐ。"}, "application": [{"zh": "再来一单按钮", "en": "“Order again” button", "ja": "「もう一度注文」ボタン"}, {"zh": "默认地址和付款方式", "en": "Default address and payment", "ja": "初期住所と決済"}, {"zh": "刷脸支付一步完成", "en": "Face payment in one step", "ja": "顔認証で一歩決済"}], "defense": [{"zh": "关闭免密支付", "en": "Turn off passwordless payment", "ja": "パスなし決済を切る"}, {"zh": "保留二次确认", "en": "Keep second confirmation", "ja": "二次確認を残す"}, {"zh": "删除保存的卡片", "en": "Remove saved cards", "ja": "保存カードを削除"}], "sample": {"zh": "电商 App 在商品页直接显示“今晚送达，一键买入”，省略购物车。", "en": "An ecommerce app shows “delivered tonight, buy in one tap” and skips the cart.", "ja": "ECアプリが「今夜配送、ワンタップ購入」と表示し、カートを省く。"}}, {"icon": "🎰", "key": "variable", "cat": "reward", "title": {"zh": "变量奖励", "en": "Variable reward", "ja": "変動報酬"}, "brief": {"zh": "不确定奖励让停止变难。", "en": "Uncertain reward makes stopping hard.", "ja": "不確実な報酬は停止を難しくする。"}, "micro": {"zh": "实现：抽卡、盲盒、下拉刷新、随机红包。", "en": "Methods: gacha, blind boxes, pull-to-refresh, random red packets.", "ja": "実装：ガチャ、盲箱、プル更新、ランダム红包。"}, "mechanism": {"zh": "变比率强化会制造强持续性。人不是为已获得继续，而是为下一次可能继续。", "en": "Variable-ratio reinforcement creates persistence. People continue for the next possible hit.", "ja": "変比率強化は持続性を作る。人は次の可能性のために続ける。"}, "application": [{"zh": "每次刷新内容不同", "en": "Each refresh differs", "ja": "更新ごとに内容が違う"}, {"zh": "随机金额红包", "en": "Random-value red packet", "ja": "ランダム金額红包"}, {"zh": "保底计数让再抽合理化", "en": "Pity counter rationalizes another draw", "ja": "天井カウンターが再抽選を合理化する"}], "defense": [{"zh": "预设最大尝试次数", "en": "Set maximum attempts", "ja": "最大試行回数を決める"}, {"zh": "把随机购买转成固定预算", "en": "Convert randomness into fixed budget", "ja": "ランダム購入を固定予算化"}, {"zh": "不要在接近保底时加码", "en": "Do not escalate near pity", "ja": "天井近くで増額しない"}], "sample": {"zh": "游戏抽卡显示“距离保底还差 12 抽”，停止被改写成“前功尽弃”。", "en": "A game says “12 pulls until pity,” rewriting stopping as wasting prior effort.", "ja": "ゲームが「天井まであと12回」と表示し、停止を前功水泡にする。"}}, {"icon": "🪞", "key": "identitybind", "cat": "social", "title": {"zh": "身份绑定", "en": "Identity binding", "ja": "身份バインド"}, "brief": {"zh": "把消费焊进“我是谁”。", "en": "Weld consumption into “who I am.”", "ja": "消費を「自分とは何か」に溶接する。"}, "micro": {"zh": "实现：品牌社区、粉丝文化、信仰充值。", "en": "Methods: brand communities, fandom, belief-coded payment.", "ja": "実装：ブランド社区、ファン文化、信仰課金。"}, "mechanism": {"zh": "当购买变成身份一致性，性价比判断会退后。", "en": "When buying becomes identity consistency, value-for-money recedes.", "ja": "購入が身份一貫性になると、コスパ判断は後退する。"}, "application": [{"zh": "“真正懂的人都选这个”", "en": "“People who really know choose this.”", "ja": "「本当に分かる人はこれ」"}, {"zh": "会员称号与用户等级", "en": "Member titles and levels", "ja": "会員称号とレベル"}, {"zh": "社区活动绑定品牌忠诚", "en": "Community events bind loyalty", "ja": "社区活动が忠誠を縛る"}], "defense": [{"zh": "把“我是某品牌用户”改成“我用某工具”", "en": "Replace “I am a brand user” with “I use a tool.”", "ja": "「ブランド人」ではなく「道具を使う」にする"}, {"zh": "每年清理身份型订阅", "en": "Audit identity subscriptions yearly", "ja": "身份型サブスクを年一回整理"}, {"zh": "不要让品牌替自己说话", "en": "Do not let brands speak for the self", "ja": "ブランドに自己表現を任せない"}], "sample": {"zh": "咖啡品牌把杯子、店内拍照和会员称号打包成“城市生活方式”。", "en": "A coffee brand bundles cups, in-store photos, and member titles into an “urban lifestyle.”", "ja": "コーヒーブランドがカップ、店内写真、会員称号を「都市生活様式」にする。"}}, {"icon": "📊", "key": "sunkcost", "cat": "choice", "title": {"zh": "沉没成本激活", "en": "Sunk-cost activation", "ja": "サンクコスト起動"}, "brief": {"zh": "“之前的都白费了”压过止损。", "en": "“All that would be wasted” beats quitting.", "ja": "「ここまでが無駄になる」が撤退を押し負かす。"}, "micro": {"zh": "实现：积分、连续天数、还差几个、等级系统。", "en": "Methods: points, streaks, “just a few left,” levels.", "ja": "実装：ポイント、連続日数、あと少し、レベル。"}, "mechanism": {"zh": "理性知道沉没成本不该影响未来，但损失厌恶会把已投入编码成即将失去。", "en": "Rationally, sunk cost should not matter; emotionally, invested effort feels like something about to be lost.", "ja": "理性ではサンクコストは未来に無関係だが、感情は投入済みを失いかけの物にする。"}, "application": [{"zh": "“还差 2 个章升级”", "en": "“Two stamps until upgrade.”", "ja": "「あと2スタンプで昇格」"}, {"zh": "学习连续 200 天", "en": "200-day learning streak", "ja": "学習連続200日"}, {"zh": "游戏任务做到 80%", "en": "Quest progress at 80%", "ja": "ゲーム任務80%"}], "defense": [{"zh": "预设退出条件", "en": "Set exit conditions in advance", "ja": "撤退条件を先に決める"}, {"zh": "已投入不作为继续理由", "en": "Never use investment as a reason to continue", "ja": "投入済みを継続理由にしない"}, {"zh": "把剩余成本单独计算", "en": "Calculate remaining cost alone", "ja": "残りコストだけ計算する"}], "sample": {"zh": "咖啡小程序提示“还差一杯获得金卡”，用户买的不是咖啡，是不浪费前九杯。", "en": "A coffee mini-app says “one more cup to Gold,” so the user buys not coffee, but the preservation of the first nine cups.", "ja": "コーヒーアプリが「あと一杯で金カード」と出し、ユーザーはコーヒーでなく九杯分を守る。"}}, {"icon": "⚓", "key": "anchoring", "cat": "choice", "title": {"zh": "环境锚定", "en": "Anchoring", "ja": "アンカリング"}, "brief": {"zh": "先设坐标系，再让你理性比较。", "en": "Set the coordinate system, then let you “compare rationally.”", "ja": "座標系を先に置き、理性的比較をさせる。"}, "micro": {"zh": "实现：划线原价、最贵套餐、建议零售价。", "en": "Methods: crossed-out prices, premium tier first, MSRP.", "ja": "実装：取り消し価格、高額プラン、希望小売価格。"}, "mechanism": {"zh": "锚定不是阻止判断，而是污染判断。前额叶仍在工作，但基准已被放置。", "en": "Anchoring does not stop judgment; it contaminates it. The prefrontal cortex works on a planted baseline.", "ja": "アンカリングは判断を止めず、基準を汚染する。前頭前野は置かれた基準で働く。"}, "application": [{"zh": "先展示 2999 元套餐", "en": "Show the 2999 tier first", "ja": "先に2999プランを見せる"}, {"zh": "原价 1299 划掉", "en": "Cross out 1299 list price", "ja": "1299元を取り消す"}, {"zh": "三个杯型没有小杯", "en": "Three cup sizes without small", "ja": "三サイズに小がない"}], "defense": [{"zh": "忽略原价，只看同类市场价", "en": "Ignore list price; use market comparison", "ja": "原価表示を無視し市場価格を見る"}, {"zh": "先写自己的预算锚", "en": "Write your own budget anchor first", "ja": "自分の予算アンカーを先に書く"}, {"zh": "从最低可用方案开始比较", "en": "Compare from minimum viable tier", "ja": "最低可用プランから比較"}], "sample": {"zh": "SaaS 定价页先放企业版，再让专业版显得“理性”。", "en": "A SaaS page shows Enterprise first so Pro feels reasonable.", "ja": "SaaS価格頁が先にEnterpriseを置き、Proを合理的に見せる。"}}, {"icon": "🫥", "key": "completion", "cat": "choice", "title": {"zh": "部分完成诱导", "en": "Completion pressure", "ja": "未完了圧力"}, "brief": {"zh": "70% 进度条让大脑发痒。", "en": "A 70% progress bar itches.", "ja": "70%の進捗バーは脳をむずむずさせる。"}, "micro": {"zh": "实现：免运费差额、资料完整度、成就差一个。", "en": "Methods: free-shipping gaps, profile completion, one achievement left.", "ja": "実装：送料無料まであと少し、プロフィール完成度、残り一実績。"}, "mechanism": {"zh": "未完成任务占据注意。商业把“不完整”变成付款张力。", "en": "Incomplete tasks occupy attention. Commerce turns incompletion into payment tension.", "ja": "未完了課題は注意を占有する。商業は未完了を支払い張力にする。"}, "application": [{"zh": "“离免运费还差 18 元”", "en": "“18 more for free shipping.”", "ja": "「送料無料まであと18元」"}, {"zh": "资料完成度 80%", "en": "Profile 80% complete", "ja": "プロフィール80%完成"}, {"zh": "徽章还差一个", "en": "One badge left", "ja": "徽章あと一つ"}], "defense": [{"zh": "允许未完成存在", "en": "Allow incompletion", "ja": "未完了を許す"}, {"zh": "计算为完成多花的钱", "en": "Calculate cost of completion", "ja": "完成のための追加支出を計算"}, {"zh": "完成不等于收益", "en": "Completion is not benefit", "ja": "完成は利益ではない"}], "sample": {"zh": "电商页面显示“再买 12 元免邮”，结果用户为省 8 元运费多买 25 元。", "en": "A shop says “12 more for free shipping,” so the user spends 25 to save 8.", "ja": "EC頁が「あと12元で送料無料」と出し、8元節約のため25元追加する。"}}, {"icon": "💕", "key": "parasocial", "cat": "social", "title": {"zh": "拟社会关系", "en": "Parasocial relation", "ja": "擬似社会関係"}, "brief": {"zh": "拒绝购买像是在辜负某个人。", "en": "Not buying feels like letting someone down.", "ja": "買わないことが誰かを裏切る感じになる。"}, "micro": {"zh": "实现：主播家人们，AI 人格化，品牌客服亲密化。", "en": "Methods: “family” talk, AI personae, intimate brand service.", "ja": "実装：主播の「家族」、AI人格化、親密客服。"}, "mechanism": {"zh": "单向陪伴会被误分配为关系。商业把成交改写成支持、感谢和不辜负。", "en": "One-way companionship can be misread as relationship. Commerce reframes purchase as support and gratitude.", "ja": "一方向の陪伴は関係と誤配される。商業は購入を支援と感謝に変える。"}, "application": [{"zh": "直播陪伴", "en": "Livestream companionship", "ja": "ライブ陪伴"}, {"zh": "虚拟偶像周边", "en": "Virtual idol merch", "ja": "仮想アイドルグッズ"}, {"zh": "老客户专属语气", "en": "Exclusive tone for old customers", "ja": "常連向け口調"}], "defense": [{"zh": "把关系和交易分开", "en": "Separate relationship from transaction", "ja": "関係と取引を分ける"}, {"zh": "不因熟悉感购买", "en": "Do not buy because of familiarity", "ja": "親しさで買わない"}, {"zh": "把主播当销售员而非朋友", "en": "Treat the host as a salesperson, not a friend", "ja": "主播を友人ではなく販売員として見る"}], "sample": {"zh": "主播说“家人们给我冲一下榜”，购物被改写成帮朋友撑场面。", "en": "A streamer says “family, help me push the ranking,” turning shopping into helping a friend save face.", "ja": "主播が「家族のみんなランキング助けて」と言い、買い物を友人支援に変える。"}}, {"icon": "🧱", "key": "defaults", "cat": "choice", "title": {"zh": "选择架构/默认值", "en": "Choice architecture / defaults", "ja": "選択設計/デフォルト"}, "brief": {"zh": "问题不是要不要，而是选 A 还是 B。", "en": "The question becomes not whether, but which.", "ja": "問題は「要るか」ではなく「AかBか」になる。"}, "micro": {"zh": "实现：默认套餐、推荐标签、预选附加项。", "en": "Methods: default plans, recommended labels, preselected add-ons.", "ja": "実装：初期套餐、推奨标签、事前選択オプション。"}, "mechanism": {"zh": "跳出框架比在框架内选择费力。默认值利用了懒惰、顺从和不想犯错。", "en": "Leaving a frame is harder than choosing inside it. Defaults exploit inertia, compliance, and fear of error.", "ja": "枠から出るのは枠内選択より疲れる。初期値は慣性、順応、失敗恐怖を使う。"}, "application": [{"zh": "默认选最高配", "en": "Highest tier preselected", "ja": "最高プランが初期選択"}, {"zh": "“推荐”方案居中", "en": "Recommended plan in the middle", "ja": "推奨プランを中央に置く"}, {"zh": "附加保险预选", "en": "Add-on insurance prechecked", "ja": "保険オプションが事前選択"}], "defense": [{"zh": "先找“不选”入口", "en": "Find the “no” option first", "ja": "まず「選ばない」入口を探す"}, {"zh": "重置所有默认值", "en": "Reset all defaults", "ja": "全デフォルトをリセットする"}, {"zh": "逐项取消附加项", "en": "Uncheck add-ons one by one", "ja": "追加項目を一つずつ外す"}], "sample": {"zh": "机票结账页默认勾选行李险，用户要主动取消才不会买。", "en": "A flight checkout preselects baggage insurance; the user must actively opt out.", "ja": "航空券決済頁で荷物保険が初期選択され、外さないと購入になる。"}}, {"icon": "💸", "key": "microprice", "cat": "choice", "title": {"zh": "碎片化支付", "en": "Fragmented payment", "ja": "支払い細片化"}, "brief": {"zh": "前额叶能拦住 3600，拦不住每天 9.9。", "en": "The prefrontal cortex blocks 3600, not 9.9 per day.", "ja": "前頭前野は3600を止めても、毎日9.9は止めにくい。"}, "micro": {"zh": "实现：日均成本、分期、月付展示、小额内购。", "en": "Methods: daily cost, installments, monthly framing, microtransactions.", "ja": "実装：日割り、分割、月額表示、小額課金。"}, "mechanism": {"zh": "支付痛感有阈值。总价没变，但被切碎后每一片都不够痛。", "en": "Payment pain has thresholds. The total remains, but each slice hurts too little.", "ja": "支払い痛には閾値がある。総額は同じでも細片は痛みが小さい。"}, "application": [{"zh": "“每天一杯咖啡的钱”", "en": "“The cost of one coffee a day.”", "ja": "「毎日コーヒー一杯分」"}, {"zh": "免息分期", "en": "Interest-free installments", "ja": "無利子分割"}, {"zh": "游戏 6 元礼包", "en": "Small game bundles", "ja": "ゲーム小額礼包"}], "defense": [{"zh": "年化总价", "en": "Annualize the price", "ja": "年額換算する"}, {"zh": "统计所有小额支出", "en": "Track all microspending", "ja": "全小額支出を記録"}, {"zh": "把订阅合并成月账单", "en": "Combine subscriptions into one monthly bill", "ja": "サブスクを月一明細にまとめる"}], "sample": {"zh": "效率软件说“每天不到 1 元”，但三年续费已经是一台显示器。", "en": "A productivity app says “less than 1 a day,” while three years of renewal equals a monitor.", "ja": "效率软件が「一日1元未満」と言うが、三年更新でモニター一台分になる。"}}, {"icon": "😱", "key": "fomo", "cat": "time", "title": {"zh": "FOMO 制造", "en": "FOMO manufacturing", "ja": "FOMO製造"}, "brief": {"zh": "害怕错过比想要拥有更快。", "en": "Fear of missing out is faster than wanting.", "ja": "取り逃し恐怖は所有欲より速い。"}, "micro": {"zh": "实现：限量、独家、错过不再、名额即将满。", "en": "Methods: limited, exclusive, never again, seats almost gone.", "ja": "実装：限定、独占、再販なし、残席わずか。"}, "mechanism": {"zh": "恐惧通路速度快，能抢在细致评估之前启动行动。", "en": "Fear pathways are fast enough to start action before careful evaluation.", "ja": "恐怖経路は精密評価の前に行動を起動できるほど速い。"}, "application": [{"zh": "早鸟价倒计时", "en": "Early-bird countdown", "ja": "早割カウントダウン"}, {"zh": "限定掉落", "en": "Limited drop", "ja": "限定ドロップ"}, {"zh": "名额进度条", "en": "Seat-progress bar", "ja": "残席進捗バー"}], "defense": [{"zh": "错过一次训练耐受", "en": "Practice missing out once", "ja": "一度逃して耐性を作る"}, {"zh": "问：错过会造成真实损失吗？", "en": "Ask: will missing it cause real loss?", "ja": "問う：逃すと実損があるか？"}, {"zh": "记录错过后的实际后果", "en": "Record the actual result after missing out", "ja": "逃した後の実結果を記録する"}], "sample": {"zh": "训练营页面显示“还剩 3 席”，但没有说明一共多少席。", "en": "A workshop page says “only 3 seats left” without saying how many existed.", "ja": "講座頁が「残り3席」と表示するが、総席数は言わない。"}}, {"icon": "🔄", "key": "habit", "cat": "time", "title": {"zh": "习惯回路劫持", "en": "Habit-loop hijack", "ja": "習慣回路ハイジャック"}, "brief": {"zh": "一旦自动化，就不再每次经过判断。", "en": "Once automated, behavior stops asking permission.", "ja": "自動化されると行動は許可を求めない。"}, "micro": {"zh": "实现：每日签到、固定推送、周几会员日。", "en": "Methods: daily check-ins, fixed notifications, weekly member days.", "ja": "実装：毎日签到、固定通知、曜日会員日。"}, "mechanism": {"zh": "习惯由线索、行为、奖励构成。商业把购买嵌入日常节律。", "en": "Habits chain cue, routine, and reward. Commerce embeds purchasing into daily rhythm.", "ja": "習慣は手がかり、行動、報酬でできる。商業は購入を日常リズムに埋め込む。"}, "applicat  the environment before clear intent forms.", "ja": "明確な意図が形成される前に環境を配置する。"}, "micro": {"zh": "实现：算法推荐、A/B 测试、个性化内容和价格。", "en": "Methods: recommendations, A/B tests, personalized content and pricing.", "ja": "実装：推薦、A/Bテスト、個人化内容と価格。"}, "mechanism": {"zh": "系统从停留、复看、滑动、搜索推断脆弱点，提前推送可触发内容。", "en": "The system infers vulnerabilities from dwell, rewatch, scroll, and search, then feeds triggers early.", "ja": "システムは滞在、再視聴、スクロール、検索から脆弱点を推定し、先にトリガーを出す。"}, "application": [{"zh": "猜你喜欢", "en": "“You may also like.”", "ja": "おすすめ"}, {"zh": "再营销广告", "en": "Retargeting ads", "ja": "リターゲティング広告"}, {"zh": "个性化排序", "en": "Personalized ranking", "ja": "個人化ランキング"}], "defense": [{"zh": "清理兴趣标签", "en": "Clear interest labels", "ja": "興味タグを消す"}, {"zh": "隔离账户或无痕使用", "en": "Use isolated or incognito accounts", "ja": "隔離アカウントまたは匿名使用"}, {"zh": "减少训练算法的反馈", "en": "Reduce feedback used to train the algorithm", "ja": "算法訓練フィードバックを減らす"}], "sample": {"zh": "看了两条露营视频后，首页开始连续出现帐篷、炉具和越野包。", "en": "After two camping videos, the home feed begins serving tents, stoves, and overland bags.", "ja": "キャンプ動画を二本見ると、トップにテント、炉具、越野バッグが並び始める。"}}];
const cases=[{"title": {"zh": "双十一", "en": "Double 11", "ja": "ダブルイレブン"}, "score": 96, "body": {"zh": "购物节不是促销日，而是认知过载、损失厌恶、囤积本能和时间压缩的复合场。", "en": "A shopping festival is not a sale day; it is a compound field of overload, loss aversion, hoarding, and time compression.", "ja": "购物祭は単なるセール日ではなく、過負荷、損失回避、備蓄本能、時間圧縮の複合場。"}, "example": {"zh": "用户本来只想买洗衣液。页面先让他付订金，再给跨店满减、红包雨、凑单推荐和库存倒计时。最后他买了洗衣液、纸巾、锅和一个“以后会用到”的收纳箱。", "en": "A user only wanted detergent. The page adds a deposit, cross-store thresholds, red-packet rain, bundle suggestions, and stock countdowns. They end with detergent, tissues, a pan, and a storage box “for later.”", "ja": "ユーザーは洗剤だけ欲しかった。ページは予約金、店舗横断割引、红包雨、凑单推薦、在庫カウントを出す。最後に洗剤、ティッシュ、鍋、「いつか使う」収納箱まで買う。"}, "steps": [{"zh": "预热期制造准拥有：收藏、加购、订金。", "en": "Preheat creates quasi-ownership: favorites, carting, deposits.", "ja": "予熱期が準所有を作る：お気に入り、カート、予約金。"}, {"zh": "复杂满减让用户从“要不要买”转向“怎么凑最划算”。", "en": "Complex discounts shift the question from whether to buy to how to optimize.", "ja": "複雑割引が「買うか」から「どう凑めるか」へ移す。"}, {"zh": "倒计时压缩判断窗口，库存提示激活损失厌恶。", "en": "Countdowns compress judgment; stock warnings activate loss aversion.", "ja": "カウントダウンが判断窓を圧縮し、在庫表示が損失回避を起動。"}, {"zh": "一键支付降低门槛，晒单反向构成社会证据。", "en": "One-click payment lowers friction; sharing orders creates social proof.", "ja": "ワンクリックが摩擦を下げ、晒单が社会証拠になる。"}]}, {"title": {"zh": "抽卡/盲盒", "en": "Gacha / blind box", "ja": "ガチャ/盲箱"}, "score": 94, "body": {"zh": "抽卡把消费伪装成命运事件。用户买的不是物品，而是下一次可能性的神经波动。", "en": "Gacha disguises payment as fate. The user buys not an item but the neural fluctuation of the next possibility.", "ja": "ガチャは消費を運命事件に偽装する。ユーザーは物ではなく次の可能性の神経波を買う。"}, "example": {"zh": "玩家已经抽了 78 次，系统提示“90 抽保底”。此时再抽不是喜欢角色，而是不能让前 78 次变成废墟。", "en": "A player has pulled 78 times and sees “guaranteed at 90.” Another pull is no longer about liking the character; it prevents the first 78 from becoming waste.", "ja": "プレイヤーは78回引き「90回天井」を見る。次の抽選はキャラ愛ではなく、78回分を無駄にしないためになる。"}, "steps": [{"zh": "稀有度连接等级展示。", "en": "Rarity connects to stat function setStaticText(){document.title=T('title');document.documentElement.lang=lang==='zh'?'zh-CN':lang==='ja'?'ja':'en';$$('[data-t]').forEach(el=>el.textContent=T(el.dataset.t));$('#instinctSearch').placeholder=T('instinctSearch');$('#techSearch').placeholder=T('techSearch');$$('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));$('#defenseToggle').textContent=document.body.classList.contains('defense-mode')?T('attack'):T('defense');$$('.node').forEach(n=>{const d=NODE_DATA[n.dataset.node][lang];n.innerHTML=d.label;n.dataset.note=d.note;});}
function cardHTML(item,type){const search=[L(item.title),L(item.brief),L(item.micro),L(item.mechanism),...item.application.map(L),...item.defense.map(L)].join(' ').toLowerCase();return `<article class="card" data-type="${type}" data-cat="${item.cat}" data-search="${search.replace(/"/g,'&quot;')}"><div class="top"><div class="icon">${item.icon}</div><div class="tag">${CAT_LABELS[lang][item.cat]||item.cat}</div></div><h3>${L(item.title)}</h3><p>${L(item.brief)}</p><div class="micro">${L(item.micro)}</div></article>`;}
function renderGrid(type){const data=type==='instinct'?instincts:techs;const grid=$(type==='instinct'?'#instinctGrid':'#techGrid');grid.innerHTML=data.map(x=>cardHTML(x,type)).join('');grid.querySelectorAll('.card').forEach((card,i)=>card.addEventListener('click',()=>openDock(data[i],type,card)));applyFilter(type);}
function openDock(item,type,card){$$('.card').forEach(c=>c.classList.remove('selected'));card&&card.classList.add('selected');$('#dockTitle').textContent=item.icon+' '+L(item.title);$('#dockBody').innerHTML=`<p>${L(item.mechanism)}</p><div class="example-block"><b>${T('comboExample')}</b>${L(item.sample)}</div><h4>${T('dockCommercial')}</h4><ul>${item.application.map(x=>`<li>${L(x)}</li>`).join('')}</ul><h4>${T('dockDefense')}</h4><ul>${item.defense.map(x=>`<li>${L(x)}</li>`).join('')}</ul><div class="warning">${document.body.classList.contains('defense-mode')?T('dockWarningDefense'):T('dockWarningAttack')}</div>`;$('#dock').classList.add('open');}
function applyFilter(type){const search=$(type==='instinct'?'#instinctSearch':'#techSearch').value.trim().toLowerCase();const active=$(`.chip.active[data-target="${type}"]`).dataset.filter;$$(type==='instinct'?'#instinctGrid .card':'#techGrid .card').forEach(card=>{const okCat=active==='all'||card.dataset.cat===active;const okText=!search||card.dataset.search.includes(search);card.style.display=okCat&&okText?'block':'none';});}
function renderPicker(){const il=$('#instinctPick'),tl=$('#techPick');il.innerHTML=instincts.map((x,i)=>`<button class="pick ${currentInstinct.key===x.key?'active':''}" data-i="${i}">${x.icon} ${L(x.title)}</button>`).join('');tl.innerHTML=techs.map((x,i)=>`<button class="pick ${currentTech.key===x.key?'active':''}" data-i="${i}">${x.icon} ${L(x.title)}</button>`).join('');il.querySelectorAll('.pick').forEach(btn=>btn.addEventListener('click',()=>{il.querySelectorAll('.pick').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentInstinct=instincts[+btn.dataset.i];updateCombo();}));tl.querySelectorAll('.pick').forEach(btn=>btn.addEventListener('click',()=>{tl.querySelectorAll('.pick').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentTech=techs[+btn.dataset.i];updateCombo();}));updateCombo();}
function comboSentence(i,t,defense){if(lang==='en'){return defense?`Identify when <strong>${L(i.title)}</strong> is triggered, then interrupt <strong>${L(t.title)}</strong>. Use: ${[...i.defense.slice(0,1),...t.defense.slice(0,2)].map(L).join('; ')}.`:`Use <strong>${L(i.title)}</strong> as motivation, then let <strong>${L(t.title)}</strong> compress the judgment window. Interfaces: ${[...i.application.slice(0,2),...t.application.slice(0,2)].map(L).join('; ')}.`;}if(lang==='ja'){return defense?`<strong>${L(i.title)}</strong> が起動される場面を識別し、<strong>${L(t.title)}</strong> を遮断する。方法：${[...i.defense.slice(0,1),...t.defense.slice(0,2)].map(L).join('；')}。`:`<strong>${L(i.title)}</strong> を動機にし、<strong>${L(t.title)}</strong> で判断窓を圧縮する。界面：${[...i.application.slice(0,2),...t.application.slice(0,2)].map(L).join('；')}。`;}return defense?`先识别 <strong>${L(i.title)}</strong> 被触发的情境，再针对 <strong>${L(t.title)}</strong> 增加阻断。具体做法：${[...i.defense.slice(0,1),...t.defense.slice(0,2)].map(L).join('；')}。`:`用 <strong>${L(i.title)}</strong> 提供动机，用 <strong>${L(t.title)}</strong> 压缩判断窗口。可见接口：${[...i.application.slice(0,2),...t.application.slice(0,2)].map(L).join('；')}。`;}
function updateCombo(){const i=currentInstinct,t=currentTech;const defense=document.body.classList.contains('defense-mode');let psych=lang==='en'?`The user does not first become convinced. The interface turns ${L(i.title)} into a low-friction action through ${L(t.title)}.`:lang==='ja'?`ユーザーは先に納得するのではない。界面が ${L(i.title)} を ${L(t.title)} によって低摩擦行動へ変換する。`:`用户不是先被说服，而是在界面里把“${L(i.title)}”通过“${L(t.title)}”转成一次低摩擦动作。`;$('#comboOutput').innerHTML=`<h4>${i.icon} ${L(i.title)} × ${t.icon} ${L(t.title)}</h4><p><b>${defense?T('defensePath'):T('commercialPath')}：</b>${comboSentence(i,t,defense)}</p><div class="mini-grid"><div class="mini-box"><b>${T('comboInterface')}</b>${L(t.sample)}</div><div class="mini-box"><b>${T('comboPsych')}</b>${psych}</div></div><div class="example-block"><b>${T('comboExample')}</b>${L(i.sample)} ${L(t.sample)}</div><div class="formula-line">${T('comboFbm')}：Motivation=${L(i.title)} / Ability=low-friction action / Trigger=${L(t.title)}</div>`;}
function updateRisk(){const mot=+$('#mot').value,abi=+$('#abi').value,tri=+$('#tri').value,fat=+$('#fat').value,fri=+$('#fri').value;$('#motVal').textContent=mot;$('#abiVal').textContent=abi;$('#triVal').textContent=tri;$('#fatVal').textContent=fat;$('#friVal').textContent=fri;let raw=(mot*.26+abi*.23+tri*.24+fat*.18-fri*.22)+8;let synergy=(mot*abi*tri)/100000*18;let risk=Math.max(0,Math.min(99,Math.round(raw+synergy)));$('#riskNum').textContent=risk;$('#gauge').style.setProperty('--risk',risk);let rt=RISK_TEXT[lang];let level=risk>78?rt.high:risk>54?rt.mid:risk>32?rt.lowmid:rt.low;let prescription=risk>78?rt.phigh:risk>54?rt.pmid:risk>32?rt.plowmid:rt.plow;$('#diagnosis').innerHTML=`<strong>${level}</strong><br>${prescription}`;}
function renderCases(){const tabs=$('#caseTabs');tabs.innerHTML=cases.map((c,i)=>`<button class="case-tab ${i===0?'active':''}" data-i="${i}">${L(c.title)}</button>`).join('');tabs.querySelectorAll('.case-tab').forEach(btn=>btn.addEventListener('click',()=>{tabs.querySelectorAll('.case-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');showCase(+btn.dataset.i)}));showCase(0);}
function showCase(i){const c=cases[i];$('#caseScore').textContent=c.score;$('#caseCopy').innerHTML=`<h4>${L(c.title)}</h4><p>${L(c.body)}</p><div class="example-block"><b>${T('caseExample')}</b>${L(c.example)}</div><div class="steps">${c.steps.map(s=>`<div class="step">${L(s)}</div>`).join('')}</div>`;}
function renderTimeline(){$('#timelineGrid').innerHTML=timeline.map(x=>`<div class="timeline-item"><div class="time-badge">${x.badge}</div><div><h3>${L(x.title)}</h3><p>${L(x.body)}</p></div></div>`).join('');}
function setLang(newLang){lang=newLang;localStorage.setItem('monkeyLang',lang);setStaticText();renderGrid('instinct');renderGrid('tech');renderPicker();renderCases();renderTimeline();updateRisk();}
function initCanvas(){const canvas=$('#field'),ctx=canvas.getContext('2d');let w,h,dpr,pts=[];function resize(){dpr=Math.min(devicePixelRatio||1,2);w=canvas.width=innerWidth*dpr;h=canvas.height=innerHeight*dpr;canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';pts=Array.from({length:Math.floor(innerWidth/12)},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.25*dpr,vy:(Math.random()-.5)*.25*dpr,r:(Math.random()*1.7+0.5)*dpr}))}function loop(){ctx.clearRect(0,0,w,h);ctx.fillStyle='rgba(84,230,255,.55)';pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill()});ctx.strokeStyle='rgba(84,230,255,.065)';for(let a=0;a<pts.length;a++){for(let b=a+1;b<pts.length;b++){const dx=pts[a].x-pts[b].x,dy=pts[a].y-pts[b].y,dist=Math.hypot(dx,dy);if(dist<120*dpr){ctx.globalAlpha=1-dist/(120*dpr);ctx.beginPath();ctx.moveTo(pts[a].x,pts[a].y);ctx.lineTo(pts[b].x,pts[b].y);ctx.stroke();ctx.globalAlpha=1}}}requestAnimationFrame(loop)}addEventListener('resize',resize);resize();loop()}
function init(){setStaticText();renderGrid('instinct');renderGrid('tech');renderPicker();renderCases();renderTimeline();updateRisk();initCanvas();$('#metricTech').textContent=techs.length;$('#metricInstinct').textContent=instincts.length;['mot','abi','tri','fat','fri'].forEach(id=>$('#'+id).addEventListener('input',updateRisk));['instinct','tech'].forEach(type=>{$((type==='instinct')?'#instinctSearch':'#techSearch').addEventListener('input',()=>applyFilter(type));$$(`.chip[data-target="${type}"]`).forEach(btn=>btn.addEventListener('click',()=>{$$(`.chip[data-target="${type}"]`).forEach(b=>b.classList.remove('active'));btn.classList.add('active');applyFilter(type)}));});$('#dockClose').addEventListener('click',()=>$('#dock').classList.remove('open'));$('#defenseToggle').addEventListener('click',()=>{document.body.classList.toggle('defense-mode');$('#defenseToggle').classList.toggle('active');$('#defenseToggle').textContent=document.body.classList.contains('defense-mode')?T('attack'):T('defense');updateCombo();});$$('.lang-btn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));$$('.node').forEach(n=>n.addEventListener('click',()=>{n.classList.add('hot');setTimeout(()=>n.classList.remove('hot'),700);$('#dockTitle').textContent=n.textContent.replace(/\s+/g,' ');$('#dockBody').innerHTML=`<p>${n.dataset.note}</p><div class="warning">${T('nodeWarning')}</div>`;$('#dock').classList.add('open')}));document.addEventListener('mousemove',e=>{document.body.style.setProperty('--mx',e.clientX+'px');document.body.style.setProperty('--my',e.clientY+'px')});addEventListener('scroll',()=>{$('#progress').style.width=(scrollY/(document.documentElement.scrollHeight-innerHeight)*100)+'%'});const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')}),{threshold:.12});$$('.reveal').forEach(x=>io.observe(x));}
init();
</script>
</body>
